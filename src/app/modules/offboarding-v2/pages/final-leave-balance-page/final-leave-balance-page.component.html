<nz-page-header nzTitle="Final Leave Balance" nzSubtitle="Offboarding v2">
  <nz-page-header-extra>
    <button nz-button (click)="back()">Back to Case</button>
  </nz-page-header-extra>
</nz-page-header>

<nz-card nzSize="small" nzTitle="Balance Calculation">
  <form nz-form nzLayout="vertical" [formGroup]="form">
    <div nz-row [nzGutter]="12">
      <div nz-col [nzXs]="24" [nzMd]="8">
        <nz-form-item>
          <nz-form-label nzRequired>Leave Balance Days</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="leaveBalanceDays" [nzMin]="0" [nzStep]="1"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzXs]="24" [nzMd]="8">
        <nz-form-item>
          <nz-form-label nzRequired>Carried Over Threshold</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="carriedOverThreshold" [nzMin]="0" [nzStep]="1"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzXs]="24" [nzMd]="8">
        <nz-form-item>
          <nz-form-label nzRequired>Daily Rate</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="dailyRate" [nzMin]="0" [nzStep]="1"></nz-input-number>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
  </form>

  <div class="result-box">
    <span>Payable Amount</span>
    <strong>{{ payableAmount | number: '1.2-2' }}</strong>
  </div>
</nz-card>
