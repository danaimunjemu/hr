<nz-page-header nzTitle="Offboarding Requests" nzBackIcon>
  <nz-page-header-subtitle>Manage and approve employee offboarding records.</nz-page-header-subtitle>
  <nz-page-header-extra>
    <button nz-button nzType="primary" routerLink="/app/offboarding/new">
      <span nz-icon nzType="plus"></span>
      Create Request
    </button>
  </nz-page-header-extra>
</nz-page-header>

<div class="employees-page">
  <nz-card nzSize="small" class="employees-card">
    <div class="table-toolbar">
      <div class="search-wrap">
        <span nz-icon nzType="search"></span>
        <input
          nz-input
          [value]="searchTerm"
          (input)="onSearch($any($event.target).value)"
          placeholder="Search employee, type, status, or last working day"
        />
      </div>
      <button nz-button nzType="default" nzSize="small" (click)="resetFilters()">
        Reset Filters
      </button>
    </div>

    <nz-table
      #offboardingTable
      [nzData]="filteredRecords"
      [nzLoading]="loading"
      [nzPageSize]="10"
      [nzSimple]="'true'"
      [nzShowSizeChanger]="false"
      [nzSize]="'small'"
    >
      <thead>
        <tr>
          <th [nzShowSort]="true" [nzSortFn]="employeeSortFn" [nzFilters]="employeeFilters()" [nzFilterFn]="employeeFilterFn" [nzFilterMultiple]="true">
            Employee
          </th>
          <th [nzShowSort]="true" [nzSortFn]="typeSortFn" [nzFilters]="typeFilters()" [nzFilterFn]="typeFilterFn" [nzFilterMultiple]="true">
            Type
          </th>
          <th [nzShowSort]="true" [nzSortFn]="lastWorkingDaySortFn" [nzFilters]="lastWorkingDayFilters()" [nzFilterFn]="lastWorkingDayFilterFn" [nzFilterMultiple]="true">
            Last Working Day
          </th>
          <th [nzShowSort]="true" [nzSortFn]="statusSortFn" [nzFilters]="statusFilters()" [nzFilterFn]="statusFilterFn" [nzFilterMultiple]="true">
            Status
          </th>
          <th class="actions-col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let record of offboardingTable.data">
          <td>
            <div class="employee-name">{{ employeeLabel(record) }}</div>
            <div class="employee-meta">{{ employeeNumberLabel(record) }}</div>
          </td>
          <td>{{ (record.offboardingType || '-') | capitalize }}</td>
          <td>{{ record.lastWorkingDay | date: 'mediumDate' }}</td>
          <td>
            <nz-tag [nzColor]="statusColor(record.approvalStatus)">{{ (record.approvalStatus || '-') | capitalize }}</nz-tag>
          </td>
          <td class="actions-cell">
            <nz-space>
              <button *nzSpaceItem nz-button nzType="default" nzSize="small" (click)="view(record)">
                View
              </button>
              <button
                *nzSpaceItem
                nz-button
                nzType="default"
                nzDanger
                nzSize="small"
                nz-popconfirm
                nzPopconfirmTitle="Delete this record?"
                nzPopconfirmPlacement="topRight"
                (nzOnConfirm)="remove(record)"
                [disabled]="actionLoadingId === record.id"
              >
                Delete
              </button>
            </nz-space>
          </td>
        </tr>
      </tbody>
    </nz-table>

    <nz-empty *ngIf="!loading && filteredRecords.length === 0" nzNotFoundContent="No offboarding records found."></nz-empty>
  </nz-card>
</div>
