<nz-page-header nzTitle="Create Offboarding Record" nzBackIcon (nzBack)="cancel()"></nz-page-header>

<div class="page-content">
  <nz-card nzSize="small">
    <nz-alert
      nzType="info"
      nzShowIcon
      [nzMessage]="'Offboarding Request For: ' + loggedInUserName"
      class="mb-4"
    ></nz-alert>

    <form nz-form [formGroup]="form" nzLayout="vertical" (ngSubmit)="create()">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Offboarding Type</nz-form-label>
            <nz-form-control nzErrorTip="Offboarding type is required">
              <nz-select formControlName="offboardingType" nzPlaceHolder="Select type">
                <nz-option *ngFor="let type of offboardingTypes" [nzValue]="type" [nzLabel]="type | capitalize"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Exit Date</nz-form-label>
            <nz-form-control nzErrorTip="Exit date is required">
              <nz-date-picker formControlName="exitDate" style="width: 100%;"></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-form-item>
        <nz-form-label nzRequired>Reason for Offboarding</nz-form-label>
        <nz-form-control nzErrorTip="Reason is required">
          <textarea nz-input formControlName="reason" rows="4" placeholder="Provide offboarding reason"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Comments</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="comments" rows="3" placeholder="Optional comments"></textarea>
        </nz-form-control>
      </nz-form-item>

      <div class="actions-row">
        <button nz-button nzType="default" type="button" (click)="cancel()">
          Cancel
        </button>
        <button nz-button nzType="primary" [disabled]="saving || form.invalid">
          Create Offboarding
        </button>
      </div>
    </form>
  </nz-card>
</div>
