<form nz-form [formGroup]="form" nzLayout="vertical" (ngSubmit)="submit()">
  <div nz-row [nzGutter]="16">
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12">
      <nz-form-item>
        <nz-form-label nzRequired>Employee</nz-form-label>
        <nz-form-control nzErrorTip="Employee is required">
          <nz-select
            formControlName="employeeId"
            nzShowSearch
            nzAllowClear
            [nzLoading]="loadingEmployees"
            nzPlaceHolder="Select employee"
          >
            <nz-option
              *ngFor="let employee of employeeOptions"
              [nzValue]="employee.id"
              [nzLabel]="employee.firstName + ' ' + employee.lastName + ' (' + employee.employeeNumber + ')'"
            ></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div>

    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12">
      <nz-form-item>
        <nz-form-label nzRequired>Offboarding Type</nz-form-label>
        <nz-form-control nzErrorTip="Offboarding type is required">
          <nz-select formControlName="offboardingType" nzPlaceHolder="Select type">
            <nz-option *ngFor="let type of offboardingTypes" [nzValue]="type" [nzLabel]="type | capitalize"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div>
  </div>

  <div nz-row [nzGutter]="16">
    <div nz-col [nzXs]="24" [nzSm]="24" [nzMd]="12">
      <nz-form-item>
        <nz-form-label nzRequired>Last Working Day</nz-form-label>
        <nz-form-control nzErrorTip="Last working day is required">
          <nz-date-picker formControlName="lastWorkingDay" style="width: 100%;"></nz-date-picker>
        </nz-form-control>
      </nz-form-item>
    </div>
  </div>

  <nz-form-item>
    <nz-form-label nzRequired>Reason for Offboarding</nz-form-label>
    <nz-form-control nzErrorTip="Reason is required">
      <textarea nz-input formControlName="reason" rows="4" placeholder="Provide offboarding reason"></textarea>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Notes / Comments</nz-form-label>
    <nz-form-control>
      <textarea nz-input formControlName="notes" rows="3" placeholder="Optional notes"></textarea>
    </nz-form-control>
  </nz-form-item>

  <div class="actions-row">
    <button nz-button nzType="default" type="button" (click)="cancel()">
      Cancel
    </button>
    <button nz-button nzType="primary" [disabled]="saving || form.invalid">
      {{ mode === 'create' ? 'Create Offboarding' : 'Save Changes' }}
    </button>
  </div>
</form>
