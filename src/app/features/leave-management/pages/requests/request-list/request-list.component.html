<div class="p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">My Leave Requests</h1>
        <button nz-button nzType="primary" routerLink="new">
            <span nz-icon nzType="plus"></span> New Request
        </button>
    </div>

    <nz-card>
        <nz-table #requestTable [nzData]="requests()" [nzLoading]="loading()">
            <thead>
                <tr>
                    <th>Leave Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Days</th>
                    <th>Status</th>
                    <th>LM Approval</th>
                    <th>HR Approval</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let data of requestTable.data">
                    <td>{{ data.leaveType.name }}</td>
                    <td>{{ data.startDate | date }}</td>
                    <td>{{ data.endDate | date }}</td>
                    <td>{{ data.totalDays }}</td>
                    <td>
                        <nz-tag [nzColor]="getStatusColor(data.status)">{{ data.status }}</nz-tag>
                    </td>
                    <td>
                        <nz-tag [nzColor]="getStatusColor(data.lineManagerApprovalStatus)">{{
                            data.lineManagerApprovalStatus }}</nz-tag>
                    </td>
                    <td>
                        <nz-tag [nzColor]="getStatusColor(data.hrApprovalStatus)">{{ data.hrApprovalStatus }}</nz-tag>
                    </td>
                    <td class="space-x-2">
                        <a [routerLink]="[data.id]">View</a>
                        <a *ngIf="data.status === 'DRAFT'" (click)="submitRequest(data.id!)"
                            class="text-blue-600">Submit</a>
                    </td>
                </tr>
            </tbody>
        </nz-table>
    </nz-card>
</div>
