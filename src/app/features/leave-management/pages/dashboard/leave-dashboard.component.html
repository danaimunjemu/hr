<div class="leave-dashboard p-6">
  <div class="mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Leave Management Dashboard</h1>
      <p class="text-gray-500">Overview of your leave status and requests</p>
    </div>
    <div class="flex items-center space-x-4">
      <nz-select [ngModel]="selectedLeaveTypeId()" (ngModelChange)="onLeaveTypeChange($event)" class="w-48"
        nzPlaceHolder="Select Leave Type" [nzLoading]="leaveTypes().length === 0">
        <nz-option *ngFor="let type of leaveTypes()" [nzValue]="type.id" [nzLabel]="type.name"></nz-option>
      </nz-select>
      <div class="space-x-2">
        <button nz-button nzType="primary" routerLink="requests/new">
          <span nz-icon nzType="plus"></span> New Request
        </button>
        <button nz-button nzType="default" routerLink="requests/my-requests">
          <span nz-icon nzType="profile"></span> My Leave Requests
        </button>
        <!-- <button nz-button nzType="default" routerLink="balances">
          View Balances
        </button> -->
      </div>
    </div>
  </div>

  <nz-spin [nzSpinning]="loading()">
    <!-- Stats Cards -->
    <div nz-row [nzGutter]="16" class="mb-6">
      <div nz-col [nzSpan]="6">
        <nz-card>
          <nz-statistic [nzValue]="availableDays()" [nzTitle]="'Available Balance'" [nzPrefix]="prefixAvailable"
            [nzValueStyle]="{ color: '#3F8600' }"></nz-statistic>
          <ng-template #prefixAvailable><span nz-icon nzType="check-circle"></span></ng-template>
        </nz-card>
      </div>
      <div nz-col [nzSpan]="6">
        <nz-card>
          <nz-statistic [nzValue]="totalEntitlement()" [nzTitle]="'Total Entitlement'"
            [nzPrefix]="prefixEntitlement"></nz-statistic>
          <ng-template #prefixEntitlement><span nz-icon nzType="calendar"></span></ng-template>
        </nz-card>
      </div>
      <div nz-col [nzSpan]="6">
        <nz-card>
          <nz-statistic [nzValue]="takenDays()" [nzTitle]="'Days Taken'" [nzPrefix]="prefixTaken"
            [nzValueStyle]="{ color: '#cf1322' }"></nz-statistic>
          <ng-template #prefixTaken><span nz-icon nzType="logout"></span></ng-template>
        </nz-card>
      </div>
      <div nz-col [nzSpan]="6">
        <nz-card>
          <nz-statistic [nzValue]="pendingDays()" [nzTitle]="'Pending Approval'" [nzPrefix]="prefixPending"
            [nzValueStyle]="{ color: '#faad14' }"></nz-statistic>
          <ng-template #prefixPending><span nz-icon nzType="clock-circle"></span></ng-template>
        </nz-card>
      </div>
    </div>

    <!-- Graphs -->
    <div nz-row [nzGutter]="16" class="mb-6">
      <div nz-col [nzSpan]="12">
        <nz-card nzTitle="Leave Consumption Trend">
          <div #consumptionChart class="chart-container"></div>
        </nz-card>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-card nzTitle="Leave Type Distribution">
          <div #distributionChart class="chart-container"></div>
        </nz-card>
      </div>
    </div>

    <!-- Recent Requests Table -->
    <nz-card nzTitle="Recent Leave Requests">
      <nz-table #requestTable [nzData]="recentRequests()" [nzShowPagination]="false" nzSize="small">
        <thead>
          <tr>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Days</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of requestTable.data">
            <td>{{ data.leaveType.name }}</td>
            <td>{{ data.startDate | date }}</td>
            <td>{{ data.endDate | date }}</td>
            <td>{{ data.totalDays }}</td>
            <td>
              <nz-tag [nzColor]="getStatusColor(data.status)">{{ data.status }}</nz-tag>
            </td>
            <td>
              <a [routerLink]="['requests', data.id]">View</a>
            </td>
          </tr>
        </tbody>
      </nz-table>
      <div class="mt-4 text-right">
        <button nz-button nzType="link" routerLink="requests">View All Requests</button>
      </div>
    </nz-card>
  </nz-spin>
</div>
